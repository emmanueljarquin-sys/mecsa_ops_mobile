org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false
android.useAndroidX=true
# Ambiente Windows con firewall/AV restrictivo — evitar el daemon y workers en paralelo
# que necesitan loopback interno de Java (causaba java.io.IOException: Unable to establish loopback connection)
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=1
